---
layout: default
title: "Lista de Archivos"
---

<h1>Índice de archivos</h1>
<ul>
  <!-- Recorre todas las páginas de tu sitio web -->
  {% for pagina in site.pages %}
    <!-- Filtra para mostrar solo las que estén dentro de una carpeta específica, por ejemplo 'articulos' -->
    {% if pagina.path contains 'post/' %}
      <li>
        <a href="{{ pagina.url | relative_url }}">{{ pagina.title | default: pagina.name }}</a>
      </li>
    {% endif %}
  {% endfor %}
</ul>
